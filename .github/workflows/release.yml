name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.21"
  JAVA_VERSION: "17"
  BINARY_NAME: "hathgo"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Run tests
        run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build archive
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME:-dev}"
          BASE_NAME="${BINARY_NAME}_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          PACKAGE_DIR="dist/${BASE_NAME}"
          mkdir -p "$PACKAGE_DIR"

          BINARY="$BINARY_NAME"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY="${BINARY}.exe"
          fi

          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" CGO_ENABLED=0 \
            go build -trimpath -ldflags="-s -w" -o "$PACKAGE_DIR/$BINARY" ./cmd/client

          cp README.md LICENSE "$PACKAGE_DIR/"
          cp scripts/install.sh scripts/install.ps1 "$PACKAGE_DIR/"
          chmod +x "$PACKAGE_DIR/install.sh"

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (
              cd dist
              zip -r "${BASE_NAME}.zip" "${BASE_NAME}"
            )
            sha256sum "dist/${BASE_NAME}.zip" > "dist/${BASE_NAME}.zip.sha256"
          else
            tar -C dist -czf "dist/${BASE_NAME}.tar.gz" "${BASE_NAME}"
            sha256sum "dist/${BASE_NAME}.tar.gz" > "dist/${BASE_NAME}.tar.gz.sha256"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error
          path: |
            dist/*.zip
            dist/*.zip.sha256
            dist/*.tar.gz
            dist/*.tar.gz.sha256

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
